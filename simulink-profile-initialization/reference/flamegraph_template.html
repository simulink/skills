<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulink Init Flamegraph</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --border: #0f3460;
    --text: #e0e0e0;
    --muted: #8899aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  .header { padding: 1.2rem 2rem 0.8rem; }
  .header h1 { font-size: 1.5rem; color: #fff; margin-bottom: 0.2rem; }
  .header .sub { font-size: 0.85rem; color: var(--muted); }
  .toolbar { padding: 0 2rem 0.8rem; display: flex; align-items: center; gap: 1rem; }
  .toolbar button { background: var(--border); color: #fff; border: none; border-radius: 4px; padding: 0.35rem 1rem; cursor: pointer; font-size: 0.82rem; }
  .toolbar button:hover { background: #1a5276; }
  .toolbar .breadcrumb { font-size: 0.82rem; color: var(--muted); }
  .toolbar .breadcrumb span { color: #53c0f0; cursor: pointer; }
  .toolbar .breadcrumb span:hover { text-decoration: underline; }

  #chart { padding: 0 2rem 2rem; overflow-x: auto; }

  .tooltip {
    position: fixed; pointer-events: none; background: rgba(0,0,0,0.92); color: #fff;
    padding: 8px 12px; border-radius: 6px; font-size: 0.82rem; line-height: 1.5;
    max-width: 420px; z-index: 1000; display: none; border: 1px solid #444;
  }
  .tooltip .tt-name { font-weight: 700; margin-bottom: 2px; }
  .tooltip .tt-dur { color: #53c0f0; }
  .tooltip .tt-pct { color: #f0ad4e; }

  .footer { padding: 1rem 2rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.75rem; text-align: center; }

  svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
</style>
</head>
<body>

<div class="header">
  <h1>🔥 Simulink Initialization Flamegraph</h1>
  <div class="sub">Total wall time: <strong>{{TOTAL_TIME}} s</strong> &mdash; Generated: {{DATE}}</div>
</div>

<div class="toolbar">
  <button id="btnReset">Reset Zoom</button>
  <div class="breadcrumb" id="breadcrumb"></div>
</div>

<div id="chart"></div>
<div class="tooltip" id="tooltip"></div>

<div class="footer">Simulink Initialization Flamegraph &mdash; Generated by Amp</div>

<script>
(function() {
  const DATA = {{FLAMEGRAPH_DATA}};

  const ROW_HEIGHT = 22;
  const MIN_WIDTH_PX = 2;
  const TEXT_MIN_WIDTH = 50;
  const PADDING = { left: 0, right: 0 };

  const chart = document.getElementById('chart');
  const tooltipEl = document.getElementById('tooltip');
  const breadcrumbEl = document.getElementById('breadcrumb');

  // Color palette - warm tones for flamegraph
  const COLORS = [
    '#e25822','#e8702a','#f09030','#f0a030','#d94f00',
    '#cc5500','#e06020','#d47b2e','#c96830','#e88828',
    '#b85a18','#d06818','#c07828','#e07828','#d09038',
    '#c08040','#b07030','#d08030','#c07020','#e09038'
  ];

  function colorForName(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
      hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
    }
    return COLORS[Math.abs(hash) % COLORS.length];
  }

  // Compute max depth of tree
  function maxDepth(node) {
    if (!node.children || node.children.length === 0) return 1;
    let md = 0;
    for (const c of node.children) md = Math.max(md, maxDepth(c));
    return md + 1;
  }

  let zoomStack = [DATA];

  function currentRoot() {
    return zoomStack[zoomStack.length - 1];
  }

  function render() {
    const root = currentRoot();
    const depth = maxDepth(root);
    const svgWidth = chart.clientWidth || 900;
    const svgHeight = depth * ROW_HEIGHT + 4;
    const totalDur = root.duration;

    chart.innerHTML = '';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', svgWidth);
    svg.setAttribute('height', svgHeight);
    svg.style.display = 'block';
    chart.appendChild(svg);

    // Flamegraph layout (bottom-up): root at bottom, children above
    function renderNode(node, left, width, level) {
      const y = svgHeight - (level + 1) * ROW_HEIGHT;
      const pct = (node.duration / DATA.duration * 100);
      const pctOfView = (node.duration / totalDur * 100);

      if (width < MIN_WIDTH_PX) return;

      // Rectangle
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', left);
      rect.setAttribute('y', y);
      rect.setAttribute('width', Math.max(width - 0.5, 0.5));
      rect.setAttribute('height', ROW_HEIGHT - 1);
      rect.setAttribute('rx', 2);
      rect.setAttribute('fill', colorForName(node.name));
      rect.setAttribute('stroke', 'rgba(0,0,0,0.3)');
      rect.setAttribute('stroke-width', 0.5);
      rect.style.cursor = node.children && node.children.length ? 'pointer' : 'default';
      svg.appendChild(rect);

      // Label
      if (width > TEXT_MIN_WIDTH) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', left + 4);
        text.setAttribute('y', y + 15);
        text.setAttribute('fill', '#fff');
        text.setAttribute('font-size', '11');
        text.setAttribute('pointer-events', 'none');
        // Truncate text to fit
        let label = node.name;
        const charW = 6.5;
        const maxChars = Math.floor((width - 8) / charW);
        if (label.length > maxChars) label = label.substring(0, maxChars - 1) + '…';
        text.textContent = label;
        svg.appendChild(text);
      }

      // Tooltip events
      rect.addEventListener('mouseenter', function(ev) {
        tooltipEl.style.display = 'block';
        tooltipEl.innerHTML =
          '<div class="tt-name">' + escapeHtml(node.name) + '</div>' +
          '<div class="tt-dur">Duration: ' + node.duration.toFixed(3) + ' s</div>' +
          '<div class="tt-pct">' + pct.toFixed(1) + '% of total (' + pctOfView.toFixed(1) + '% of view)</div>';
      });
      rect.addEventListener('mousemove', function(ev) {
        tooltipEl.style.left = Math.min(ev.clientX + 12, window.innerWidth - 440) + 'px';
        tooltipEl.style.top = (ev.clientY + 16) + 'px';
      });
      rect.addEventListener('mouseleave', function() {
        tooltipEl.style.display = 'none';
      });

      // Click to zoom
      rect.addEventListener('click', function(ev) {
        ev.stopPropagation();
        if (node.children && node.children.length > 0 && node !== currentRoot()) {
          zoomStack.push(node);
          render();
        }
      });

      // Render children
      if (node.children && node.children.length > 0) {
        // Sort children by start time
        const sorted = node.children.slice().sort((a, b) => a.start - b.start);
        for (const child of sorted) {
          const childLeft = left + ((child.start - node.start) / node.duration) * width;
          const childWidth = (child.duration / node.duration) * width;
          renderNode(child, childLeft, childWidth, level + 1);
        }
      }
    }

    renderNode(root, PADDING.left, svgWidth - PADDING.left - PADDING.right, 0);
    updateBreadcrumb();
  }

  function updateBreadcrumb() {
    let html = '';
    for (let i = 0; i < zoomStack.length; i++) {
      if (i > 0) html += ' › ';
      const node = zoomStack[i];
      if (i < zoomStack.length - 1) {
        html += '<span data-idx="' + i + '">' + escapeHtml(node.name) + '</span>';
      } else {
        html += escapeHtml(node.name);
      }
    }
    breadcrumbEl.innerHTML = html;
    breadcrumbEl.querySelectorAll('span').forEach(function(el) {
      el.addEventListener('click', function() {
        const idx = parseInt(this.getAttribute('data-idx'));
        zoomStack = zoomStack.slice(0, idx + 1);
        render();
      });
    });
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  document.getElementById('btnReset').addEventListener('click', function() {
    zoomStack = [DATA];
    render();
  });

  window.addEventListener('resize', render);
  render();
})();
</script>
</body>
</html>
